document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

minutes I'll give you my recommended approach, the risks, the impact on the business, and how I'd run it.' Set the tone: this is manageable and planned, not alarming.\">\n    <div style=\"position:relative;width:100%;height:100%;box-sizing:border-box;padding:92px 104px;background:#191B1A;color:#F1EEE8;font-family:'Barlow',sans-serif;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;\">\n      <div style=\"position:absolute;top:0;right:0;width:46%;height:100%;background:linear-gradient(180deg,rgba(188,32,24,0.14),rgba(188,32,24,0));pointer-events:none;\"><\u002Fdiv>\n      <div style=\"position:absolute;left:104px;bottom:0;width:560px;height:6px;background:#BC2018;\"><\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;gap:24px;position:relative;\">\n        <img src=\"a6733d84-33f6-4c56-9bde-ebc6f678d253\" alt=\"Fowler\" style=\"height:104px;width:auto;display:block;\">\n        <span style=\"width:1px;height:62px;background:#3A3B39;display:block;\"><\u002Fspan>\n        <span style=\"font-family:'Barlow',sans-serif;font-weight:600;font-size:15px;letter-spacing:0.22em;text-transform:uppercase;color:#9A968D;max-width:280px;line-height:1.5;\">Monthly Management Review<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"position:relative;max-width:1400px;\">\n        <span style=\"font-family:'Barlow',sans-serif;font-weight:700;font-size:21px;letter-spacing:0.2em;text-transform:uppercase;color:#F2C20B;display:block;margin-bottom:26px;\">Infrastructure Recommendation<\u002Fspan>\n        <h1 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:104px;line-height:0.98;letter-spacing:-0.022em;margin:0;color:#F7F5F0;\">Modernizing our<br>Windows servers<\u002Fh1>\n        <p style=\"font-family:'Barlow',sans-serif;font-weight:400;font-size:30px;line-height:1.4;color:#C7C3B9;margin:34px 0 0;max-width:1000px;\">A recommended approach to the servers reaching end-of-life — protecting the systems every department relies on.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"position:relative;display:flex;justify-content:space-between;align-items:flex-end;\">\n        <div style=\"display:flex;flex-direction:column;gap:6px;\">\n          <span style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:26px;color:#F1EEE8;\">Trevor Vaillancourt<\u002Fspan>\n          <span style=\"font-family:'Barlow',sans-serif;font-weight:500;font-size:18px;letter-spacing:0.04em;color:#9A968D;\">Candidate · IT Operations Specialist<\u002Fspan>\n        <\u002Fdiv>\n        <span style=\"font-family:'Barlow',sans-serif;font-weight:600;font-size:18px;letter-spacing:0.12em;color:#9A968D;\">JUNE 29, 2026<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══════════ SLIDE 2 — RECOMMENDED APPROACH ═══════════ -->\n  <section data-label=\"Approach\" data-screen-label=\"02 Approach\" data-speaker-notes=\"Lead with the answer — leadership wants the recommendation first. The one-line context strip reminds everyone of the situation without dwelling on it. State the strategy in a breath: assess first, then move each workload to where it best fits — never migrate blind. Three principles: (1) discover and document before touching anything — that directly closes the documentation gap; (2) right-size each workload — modernize on-prem where it fits, shift suitable workloads into the Azure/M365 we already own; (3) migrate in controlled, reversible phases. Stress: this builds on tools we already pay for, not a rip-and-replace.\">\n    <div style=\"position:relative;width:100%;height:100%;box-sizing:border-box;padding:84px 104px 92px;background:#F4F2ED;color:#1C1E1C;font-family:'Barlow',sans-serif;display:flex;flex-direction:column;overflow:hidden;\">\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:24px;\">\n        <span style=\"width:34px;height:4px;background:#BC2018;display:block;\"><\u002Fspan>\n        <span style=\"font-family:'Barlow',sans-serif;font-weight:700;font-size:17px;letter-spacing:0.2em;text-transform:uppercase;color:#BC2018;\">02 · Recommended Approach<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"display:inline-flex;align-self:flex-start;align-items:center;gap:12px;background:#ECE7DC;border:1px solid #E2DDD2;padding:10px 18px;margin-bottom:26px;\">\n        <span style=\"width:8px;height:8px;background:#BC2018;border-radius:50%;display:block;flex:none;\"><\u002Fspan>\n        <span style=\"font-family:'Barlow',sans-serif;font-weight:600;font-size:18px;color:#5A5F5B;\">The challenge: ~13 Windows servers at or nearing end-of-life, running apps every department uses — with limited documentation.<\u002Fspan>\n      <\u002Fdiv>\n\n      <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:56px;line-height:1.02;letter-spacing:-0.02em;margin:0 0 12px;max-width:1440px;\">Assess first — then move each workload to where it fits<\u002Fh2>\n      <p style=\"font-family:'Barlow',sans-serif;font-weight:400;font-size:24px;line-height:1.4;color:#5A5F5B;margin:0 0 38px;max-width:1200px;\">No “big bang.” We replace risk with a clear, evidence-based plan before anything is touched.<\u002Fp>\n\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:28px;flex:1;align-content:start;\">\n        <div style=\"background:#FBFAF7;border:1px solid #E2DDD2;padding:32px 30px;display:flex;flex-direction:column;\">\n          <span style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:34px;color:#BC2018;line-height:1;\">01<\u002Fspan>\n          <h3 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:27px;line-height:1.12;margin:16px 0 12px;\">Discover &amp; document<\u002Fh3>\n          <p style=\"font-family:'Barlow',sans-serif;font-weight:400;font-size:21px;line-height:1.44;color:#4A4F4C;margin:0;\">Map every server, application and dependency <strong style=\"color:#1C1E1C;\">before we migrate<\u002Fstrong>. Turn the documentation gap into a clear picture.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FBFAF7;border:1px solid #E2DDD2;padding:32px 30px;display:flex;flex-direction:column;\">\n          <span style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:34px;color:#BC2018;line-height:1;\">02<\u002Fspan>\n          <h3 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:27px;line-height:1.12;margin:16px 0 12px;\">Right-size each workload<\u002Fh3>\n          <p style=\"font-family:'Barlow',sans-serif;font-weight:400;font-size:21px;line-height:1.44;color:#4A4F4C;margin:0;\">Modernize on-prem to <strong style=\"color:#1C1E1C;\">supported Windows Server<\u002Fstrong> where it fits; move suitable workloads to <strong style=\"color:#1C1E1C;\">Azure / Microsoft 365<\u002Fstrong> to shrink what we maintain.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FBFAF7;border:1px solid #E2DDD2;padding:32px 30px;display:flex;flex-direction:column;\">\n          <span style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:34px;color:#BC2018;line-height:1;\">03<\u002Fspan>\n          <h3 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:27px;line-height:1.12;margin:16px 0 12px;\">Migrate in phases<\u002Fh3>\n          <p style=\"font-family:'Barlow',sans-serif;font-weight:400;font-size:21px;line-height:1.44;color:#4A4F4C;margin:0;\">Controlled waves with a <strong style=\"color:#1C1E1C;\">tested rollback at every step<\u002Fstrong> — the business is never exposed to a one-shot cutover.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;gap:14px;margin-top:30px;background:#191B1A;padding:20px 28px;\">\n        <span style=\"width:10px;height:10px;background:#F2C20B;border-radius:50%;display:block;flex:none;\"><\u002Fspan>\n        <p style=\"font-family:'Barlow',sans-serif;font-weight:600;font-size:22px;color:#F1EEE8;margin:0;\">We already pay for Microsoft 365 — this builds on tools and licensing we own, rather than buying everything new.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"position:absolute;left:104px;right:104px;bottom:42px;display:flex;justify-content:space-between;align-items:center;font-family:'Barlow',sans-serif;font-size:15px;letter-spacing:0.08em;color:#A8A498;text-transform:uppercase;\">\n        <span>Trevor Vaillancourt<\u002Fspan><span>Windows Server Modernization<\u002Fspan><span>02 / 10<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══════════ SLIDE 3 — PHASED TIMELINE ═══════════ -->\n  <section data-label=\"Timeline\" data-screen-label=\"03 Timeline\" data-speaker-notes=\"Walk the four phases left to right. Discovery: inventory and dependency mapping, rank by EOL date and business criticality — this is where I engage your department reps. Pilot: migrate one low-risk app end-to-end to prove the process, the backups and the rollback. Migrate: priority waves, oldest and highest-risk first, in planned windows. Decommission: retire old servers once verified, update documentation, capture the savings. The key line at the bottom: each phase ends with a go/no-go before we spend on the next — no blank cheques.\">\n    <div style=\"position:relative;width:100%;height:100%;box-sizing:border-box;padding:84px 104px 92px;background:#F4F2ED;color:#1C1E1C;font-family:'Barlow',sans-serif;display:flex;flex-direction:column;overflow:hidden;\">\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:30px;\">\n        <span style=\"width:34px;height:4px;background:#BC2018;display:block;\"><\u002Fspan>\n        <span style=\"font-family:'Barlow',sans-serif;font-weight:700;font-size:17px;letter-spacing:0.2em;text-transform:uppercase;color:#BC2018;\">03 · How it would be phased<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:58px;line-height:1.02;letter-spacing:-0.02em;margin:0 0 40px;max-width:1300px;\">A phased, low-risk plan<\u002Fh2>\n\n      <div style=\"position:relative;display:grid;grid-template-columns:repeat(4,1fr);gap:24px;flex:1;align-content:start;\">\n        <div style=\"position:absolute;top:30px;left:0;right:0;height:3px;background:#E2DDD2;z-index:0;\"><\u002Fdiv>\n\n        <div style=\"position:relative;z-index:1;display:flex;flex-direction:column;\">\n          <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:22px;\"><span style=\"width:60px;height:60px;border-radius:50%;background:#BC2018;color:#fff;font-family:'Archivo',sans-serif;font-weight:800;font-size:26px;display:flex;align-items:center;justify-content:center;flex:none;\">1<\u002Fspan><\u002Fdiv>\n          <span style=\"font-family:'Barlow',sans-serif;font-weight:700;font-size:15px;letter-spacing:0.12em;text-transform:uppercase;color:#BC2018;\">Weeks 1–4<\u002Fspan>\n          <h3 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:30px;margin:8px 0 16px;\">Discovery<\u002Fh3>\n          <ul style=\"margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:11px;\">\n            <li style=\"font-family:'Barlow',sans-serif;font-size:20px;line-height:1.36;color:#4A4F4C;padding-left:18px;position:relative;\"><span style=\"position:absolute;left:0;top:9px;width:6px;height:6px;background:#C99A2A;border-radius:50%;\"><\u002Fspan>Inventory every server &amp; app<\u002Fli>\n            <li style=\"font-family:'Barlow',sans-serif;font-size:20px;line-height:1.36;color:#4A4F4C;padding-left:18px;position:relative;\"><span style=\"position:absolute;left:0;top:9px;width:6px;height:6px;background:#C99A2A;border-radius:50%;\"><\u002Fspan>Map dependencies with dept. reps<\u002Fli>\n            <li style=\"font-family:'Barlow',sans-serif;font-size:20px;line-height:1.36;color:#4A4F4C;padding-left:18px;position:relative;\"><span style=\"position:absolute;left:0;top:9px;width:6px;height:6px;background:#C99A2A;border-radius:50%;\"><\u002Fspan>Rank by EOL date &amp; criticality<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <div style=\"position:relative;z-index:1;display:flex;flex-direction:column;\">\n          <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:22px;\"><span style=\"width:60px;height:60px;border-radius:50%;background:#BC2018;color:#fff;font-family:'Archivo',sans-serif;font-weight:800;font-size:26px;display:flex;align-items:center;justify-content:center;flex:none;\">2<\u002Fspan><\u002Fdiv>\n          <span style=\"font-family:'Barlow',sans-serif;font-weight:700;font-size:15px;letter-spacing:0.12em;text-transform:uppercase;color:#BC2018;\">Weeks 4–8<\u002Fspan>\n          <h3 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:30px;margin:8px 0 16px;\">Pilot<\u002Fh3>\n          <ul style=\"margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:11px;\">\n            <li style=\"font-family:'Barlow',sans-serif;font-size:20px;line-height:1.36;color:#4A4F4C;padding-left:18px;position:relative;\"><span style=\"position:absolute;left:0;top:9px;width:6px;height:6px;background:#C99A2A;border-radius:50%;\"><\u002Fspan>Migrate one low-risk app end-to-end<\u002Fli>\n            <li style=\"font-family:'Barlow',sans-serif;font-size:20px;line-height:1.36;color:#4A4F4C;padding-left:18px;position:relative;\"><span style=\"position:absolute;left:0;top:9px;width:6px;height:6px;background:#C99A2A;border-radius:50%;\"><\u002Fspan>Validate backups &amp; performance<\u002Fli>\n            <li style=\"font-family:'Barlow',sans-serif;font-size:20px;line-height:1.36;color:#4A4F4C;padding-left:18px;position:relative;\"><span style=\"position:absolute;left:0;top:9px;width:6px;height:6px;background:#C99A2A;border-radius:50%;\"><\u002Fspan>Prove the rollback works<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <div style=\"position:relative;z-index:1;display:flex;flex-direction:column;\">\n          <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:22px;\"><span style=\"width:60px;height:60px;border-radius:50%;background:#BC2018;color:#fff;font-family:'Archivo',sans-serif;font-weight:800;font-size:26px;display:flex;align-items:center;justify-content:center;flex:none;\">3<\u002Fspan><\u002Fdiv>\n          <span style=\"font-family:'Barlow',sans-serif;font-weight:700;font-size:15px;letter-spacing:0.12em;text-transform:uppercase;color:#BC2018;\">Months 2–6<\u002Fspan>\n          <h3 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:30px;margin:8px 0 16px;\">Migrate<\u002Fh3>\n          <ul style=\"margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:11px;\">\n            <li style=\"font-family:'Barlow',sans-serif;font-size:20px;line-height:1.36;color:#4A4F4C;padding-left:18px;position:relative;\"><span style=\"position:absolute;left:0;top:9px;width:6px;height:6px;background:#C99A2A;border-radius:50%;\"><\u002Fspan>Roll out in priority waves<\u002Fli>\n            <li style=\"font-family:'Barlow',sans-serif;font-size:20px;line-height:1.36;color:#4A4F4C;padding-left:18px;position:relative;\"><span style=\"position:absolute;left:0;top:9px;width:6px;height:6px;background:#C99A2A;border-radius:50%;\"><\u002Fspan>Oldest / highest-risk first<\u002Fli>\n            <li style=\"font-family:'Barlow',sans-serif;font-size:20px;line-height:1.36;color:#4A4F4C;padding-left:18px;position:relative;\"><span style=\"position:absolute;left:0;top:9px;width:6px;height:6px;background:#C99A2A;border-radius:50%;\"><\u002Fspan>Planned windows, each reversible<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <div style=\"position:relative;z-index:1;display:flex;flex-direction:column;\">\n          <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:22px;\"><span style=\"width:60px;height:60px;border-radius:50%;background:#191B1A;color:#fff;font-family:'Archivo',sans-serif;font-weight:800;font-size:26px;display:flex;align-items:center;justify-content:center;flex:none;\">4<\u002Fspan><\u002Fdiv>\n          <span style=\"font-family:'Barlow',sans-serif;font-weight:700;font-size:15px;letter-spacing:0.12em;text-transform:uppercase;color:#BC2018;\">Months 6–7<\u002Fspan>\n          <h3 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:30px;margin:8px 0 16px;\">Decommission<\u002Fh3>\n          <ul style=\"margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:11px;\">\n            <li style=\"font-family:'Barlow',sans-serif;font-size:20px;line-height:1.36;color:#4A4F4C;padding-left:18px;position:relative;\"><span style=\"position:absolute;left:0;top:9px;width:6px;height:6px;background:#C99A2A;border-radius:50%;\"><\u002Fspan>Retire old servers once verified<\u002Fli>\n            <li style=\"font-family:'Barlow',sans-serif;font-size:20px;line-height:1.36;color:#4A4F4C;padding-left:18px;position:relative;\"><span style=\"position:absolute;left:0;top:9px;width:6px;height:6px;background:#C99A2A;border-radius:50%;\"><\u002Fspan>Update documentation<\u002Fli>\n            <li style=\"font-family:'Barlow',sans-serif;font-size:20px;line-height:1.36;color:#4A4F4C;padding-left:18px;position:relative;\"><span style=\"position:absolute;left:0;top:9px;width:6px;height:6px;background:#C99A2A;border-radius:50%;\"><\u002Fspan>Capture cost savings<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;gap:14px;margin-top:30px;background:#ECE7DC;border:1px solid #E2DDD2;padding:18px 28px;\">\n        <span style=\"width:10px;height:10px;background:#BC2018;border-radius:50%;display:block;flex:none;\"><\u002Fspan>\n        <p style=\"font-family:'Barlow',sans-serif;font-weight:600;font-size:22px;color:#3A3F3C;margin:0;\">Each phase ends with a <strong>go / no-go checkpoint<\u002Fstrong> — we only spend on the next phase once the last one is proven.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"position:absolute;left:104px;right:104px;bottom:42px;display:flex;justify-content:space-between;align-items:center;font-family:'Barlow',sans-serif;font-size:15px;letter-spacing:0.08em;color:#A8A498;text-transform:uppercase;\">\n        <span>Trevor Vaillancourt<\u002Fspan><span>Windows Server Modernization<\u002Fspan><span>03 / 10<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══════════ SLIDE 4 — WHY IT MATTERS ═══════════ -->\n  <section data-label=\"Why It Matters\" data-screen-label=\"04 Why It Matters\" data-speaker-notes=\"Now that they've seen the plan, reinforce why it's worth doing — slow down here. Two points only. One: end-of-life means no more security patches, ever. Every new vulnerability stays open permanently, and these become the easiest way into our network. Two: we handle municipal, MTO and client data — unsupported systems put us offside on data-protection obligations, cyber-insurance and contract terms. Close with the line: the cost of acting is planned; the cost of not acting is not.\">\n    <div style=\"position:relative;width:100%;height:100%;box-sizing:border-box;padding:84px 104px 92px;background:#191B1A;color:#F1EEE8;font-family:'Barlow',sans-serif;display:flex;flex-direction:column;overflow:hidden;\">\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:30px;\">\n        <span style=\"width:34px;height:4px;background:#BC2018;display:block;\"><\u002Fspan>\n        <span style=\"font-family:'Barlow',sans-serif;font-weight:700;font-size:17px;letter-spacing:0.2em;text-transform:uppercase;color:#F2C20B;\">04 · Why this matters<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:60px;line-height:1.02;letter-spacing:-0.02em;margin:0 0 46px;max-width:1320px;color:#F7F5F0;\">End-of-life isn’t a someday problem<\u002Fh2>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:34px;flex:1;align-content:start;\">\n        <div style=\"background:#22231F;border:1px solid #34352F;padding:40px 40px 36px;display:flex;flex-direction:column;\">\n          <span style=\"font-family:'Barlow',sans-serif;font-weight:700;font-size:15px;letter-spacing:0.2em;text-transform:uppercase;color:#F2C20B;\">Risk 01 · Security<\u002Fspan>\n          <h3 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:36px;line-height:1.08;margin:16px 0 18px;color:#F7F5F0;\">No more security patches<\u002Fh3>\n          <p style=\"font-family:'Barlow',sans-serif;font-weight:400;font-size:23px;line-height:1.48;color:#C7C3B9;margin:0;\">Once a server is end-of-life, Microsoft stops issuing fixes. Every newly discovered vulnerability stays <strong style=\"color:#F1EEE8;\">open permanently<\u002Fstrong> — making these the easiest way into our network.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#22231F;border:1px solid #34352F;padding:40px 40px 36px;display:flex;flex-direction:column;\">\n          <span style=\"font-family:'Barlow',sans-serif;font-weight:700;font-size:15px;letter-spacing:0.2em;text-transform:uppercase;color:#F2C20B;\">Risk 02 · Compliance<\u002Fspan>\n          <h3 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:36px;line-height:1.08;margin:16px 0 18px;color:#F7F5F0;\">Data-protection exposure<\u002Fh3>\n          <p style=\"font-family:'Barlow',sans-serif;font-weight:400;font-size:23px;line-height:1.48;color:#C7C3B9;margin:0;\">We hold municipal, provincial (MTO) and client data. Unsupported systems put us offside on <strong style=\"color:#F1EEE8;\">data-protection obligations, cyber-insurance requirements and contract terms<\u002Fstrong>.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;gap:22px;margin-top:38px;\">\n        <span style=\"width:6px;height:58px;background:#BC2018;display:block;flex:none;\"><\u002Fspan>\n        <p style=\"font-family:'Archivo',sans-serif;font-weight:600;font-size:30px;line-height:1.22;color:#F7F5F0;margin:0;\">The cost of acting is planned and controlled. <span style=\"color:#F2C20B;\">The cost of <em>not<\u002Fem> acting is neither.<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"position:absolute;left:104px;right:104px;bottom:42px;display:flex;justify-content:space-between;align-items:center;font-family:'Barlow',sans-serif;font-size:15px;letter-spacing:0.08em;color:#6E6E66;text-transform:uppercase;\">\n        <span>Trevor Vaillancourt<\u002Fspan><span>Windows Server Modernization<\u002Fspan><span>04 / 10<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══════════ SLIDE 5 — RISKS & MITIGATIONS ═══════════ -->\n  <section data-label=\"Risks\" data-screen-label=\"05 Risks\" data-speaker-notes=\"Show leadership I've thought about what can go wrong — and that each risk has an answer. Don't read every word; hit the pairing: the documentation gap is solved by discovery plus your SMEs; downtime is handled by planned windows and rollback; compliance by validating backups and access controls. The right column is the reassurance — there's a mitigation for everything.\">\n    <div style=\"position:relative;width:100%;height:100%;box-sizing:border-box;padding:84px 104px 92px;background:#F4F2ED;color:#1C1E1C;font-family:'Barlow',sans-serif;display:flex;flex-direction:column;overflow:hidden;\">\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:30px;\">\n        <span style=\"width:34px;height:4px;background:#BC2018;display:block;\"><\u002Fspan>\n        <span style=\"font-family:'Barlow',sans-serif;font-weight:700;font-size:17px;letter-spacing:0.2em;text-transform:uppercase;color:#BC2018;\">05 · Key Considerations &amp; Risks<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:58px;line-height:1.02;letter-spacing:-0.02em;margin:0 0 34px;max-width:1300px;\">Every risk has a plan<\u002Fh2>\n\n      <div style=\"display:grid;grid-template-columns:1.1fr 1.5fr;gap:0 40px;border-top:2px solid #1C1E1C;\">\n        <div style=\"font-family:'Barlow',sans-serif;font-weight:700;font-size:15px;letter-spacing:0.16em;text-transform:uppercase;color:#9A968D;padding:14px 0 14px;\">The Risk<\u002Fdiv>\n        <div style=\"font-family:'Barlow',sans-serif;font-weight:700;font-size:15px;letter-spacing:0.16em;text-transform:uppercase;color:#9A968D;padding:14px 0 14px;\">How we manage it<\u002Fdiv>\n\n        <div style=\"border-top:1px solid #E2DDD2;padding:20px 0;display:flex;gap:14px;align-items:flex-start;\"><span style=\"width:9px;height:9px;background:#BC2018;border-radius:50%;margin-top:9px;flex:none;\"><\u002Fspan><span style=\"font-family:'Barlow',sans-serif;font-weight:700;font-size:24px;line-height:1.28;color:#1C1E1C;\">No more security patches <span style=\"font-weight:600;color:#BC2018;font-size:17px;letter-spacing:0.04em;\">· HIGHEST<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"border-top:1px solid #E2DDD2;padding:20px 0;font-family:'Barlow',sans-serif;font-size:22px;line-height:1.4;color:#4A4F4C;\">Tackle end-of-life systems <strong style=\"color:#1C1E1C;\">first<\u002Fstrong>; isolate / network-segment anything that must stay temporarily.<\u002Fdiv>\n\n        <div style=\"border-top:1px solid #E2DDD2;padding:20px 0;display:flex;gap:14px;align-items:flex-start;\"><span style=\"width:9px;height:9px;background:#BC2018;border-radius:50%;margin-top:9px;flex:none;\"><\u002Fspan><span style=\"font-family:'Barlow',sans-serif;font-weight:700;font-size:24px;line-height:1.28;color:#1C1E1C;\">Undocumented dependencies<\u002Fspan><\u002Fdiv>\n        <div style=\"border-top:1px solid #E2DDD2;padding:20px 0;font-family:'Barlow',sans-serif;font-size:22px;line-height:1.4;color:#4A4F4C;\">Discovery phase + <strong style=\"color:#1C1E1C;\">department SMEs<\u002Fstrong> map them before migrating; the pilot de-risks the unknowns.<\u002Fdiv>\n\n        <div style=\"border-top:1px solid #E2DDD2;padding:20px 0;display:flex;gap:14px;align-items:flex-start;\"><span style=\"width:9px;height:9px;background:#BC2018;border-radius:50%;margin-top:9px;flex:none;\"><\u002Fspan><span style=\"font-family:'Barlow',sans-serif;font-weight:700;font-size:24px;line-height:1.28;color:#1C1E1C;\">Business downtime<\u002Fspan><\u002Fdiv>\n        <div style=\"border-top:1px solid #E2DDD2;padding:20px 0;font-family:'Barlow',sans-serif;font-size:22px;line-height:1.4;color:#4A4F4C;\">Planned after-hours windows, phased waves, and a <strong style=\"color:#1C1E1C;\">tested rollback<\u002Fstrong> on every change.<\u002Fdiv>\n\n        <div style=\"border-top:1px solid #E2DDD2;padding:20px 0;display:flex;gap:14px;align-items:flex-start;\"><span style=\"width:9px;height:9px;background:#BC2018;border-radius:50%;margin-top:9px;flex:none;\"><\u002Fspan><span style=\"font-family:'Barlow',sans-serif;font-weight:700;font-size:24px;line-height:1.28;color:#1C1E1C;\">Compliance &amp; data protection<\u002Fspan><\u002Fdiv>\n        <div style=\"border-top:1px solid #E2DDD2;padding:20px 0;font-family:'Barlow',sans-serif;font-size:22px;line-height:1.4;color:#4A4F4C;\">Validate backups &amp; disaster recovery; check encryption, access control and retention against our obligations.<\u002Fdiv>\n\n        <div style=\"border-top:1px solid #E2DDD2;border-bottom:1px solid #E2DDD2;padding:20px 0;display:flex;gap:14px;align-items:flex-start;\"><span style=\"width:9px;height:9px;background:#BC2018;border-radius:50%;margin-top:9px;flex:none;\"><\u002Fspan><span style=\"font-family:'Barlow',sans-serif;font-weight:700;font-size:24px;line-height:1.28;color:#1C1E1C;\">Cost &amp; budget<\u002Fspan><\u002Fdiv>\n        <div style=\"border-top:1px solid #E2DDD2;border-bottom:1px solid #E2DDD2;padding:20px 0;font-family:'Barlow',sans-serif;font-size:22px;line-height:1.4;color:#4A4F4C;\">Right-sizing avoids over-buying; retiring old servers cuts <strong style=\"color:#1C1E1C;\">power, support and licensing<\u002Fstrong> costs.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"position:absolute;left:104px;right:104px;bottom:42px;display:flex;justify-content:space-between;align-items:center;font-family:'Barlow',sans-serif;font-size:15px;letter-spacing:0.08em;color:#A8A498;text-transform:uppercase;\">\n        <span>Trevor Vaillancourt<\u002Fspan><span>Windows Server Modernization<\u002Fspan><span>05 / 10<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══════════ SLIDE 6 — BUSINESS IMPACT ═══════════ -->\n  <section data-label=\"Impact\" data-screen-label=\"06 Impact\" data-speaker-notes=\"Speak to the department reps directly here. During the project: minimal disruption, work in planned windows, the only ask is brief testing help. After: supported and patched systems, better reliability and speed on the apps they use daily, stronger compliance and insurance posture, lower long-term cost. End on the line aimed at them — the applications you rely on get safer and faster, without a disruptive cutover.\">\n    <div style=\"position:relative;width:100%;height:100%;box-sizing:border-box;padding:84px 104px 92px;background:#F4F2ED;color:#1C1E1C;font-family:'Barlow',sans-serif;display:flex;flex-direction:column;overflow:hidden;\">\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:30px;\">\n        <span style=\"width:34px;height:4px;background:#BC2018;display:block;\"><\u002Fspan>\n        <span style=\"font-family:'Barlow',sans-serif;font-weight:700;font-size:17px;letter-spacing:0.2em;text-transform:uppercase;color:#BC2018;\">06 · Expected Business Impact<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:58px;line-height:1.02;letter-spacing:-0.02em;margin:0 0 40px;max-width:1300px;\">What changes for the business<\u002Fh2>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px;flex:1;align-content:start;\">\n        <div style=\"background:#FBFAF7;border:1px solid #E2DDD2;padding:36px 38px;display:flex;flex-direction:column;\">\n          <span style=\"font-family:'Barlow',sans-serif;font-weight:700;font-size:15px;letter-spacing:0.18em;text-transform:uppercase;color:#9A968D;\">During the project<\u002Fspan>\n          <h3 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:30px;margin:12px 0 22px;\">Kept deliberately quiet<\u002Fh3>\n          <ul style=\"margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:16px;\">\n            <li style=\"font-family:'Barlow',sans-serif;font-size:22px;line-height:1.4;color:#4A4F4C;padding-left:24px;position:relative;\"><span style=\"position:absolute;left:0;top:11px;width:8px;height:8px;background:#9A968D;border-radius:50%;\"><\u002Fspan><strong style=\"color:#1C1E1C;\">Minimal disruption<\u002Fstrong> — changes run in planned windows, largely invisible to staff.<\u002Fli>\n            <li style=\"font-family:'Barlow',sans-serif;font-size:22px;line-height:1.4;color:#4A4F4C;padding-left:24px;position:relative;\"><span style=\"position:absolute;left:0;top:11px;width:8px;height:8px;background:#9A968D;border-radius:50%;\"><\u002Fspan>A small ask: <strong style=\"color:#1C1E1C;\">brief testing help<\u002Fstrong> from each department.<\u002Fli>\n            <li style=\"font-family:'Barlow',sans-serif;font-size:22px;line-height:1.4;color:#4A4F4C;padding-left:24px;position:relative;\"><span style=\"position:absolute;left:0;top:11px;width:8px;height:8px;background:#9A968D;border-radius:50%;\"><\u002Fspan>No “big bang” — phased and reversible throughout.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <div style=\"background:#191B1A;border:1px solid #191B1A;padding:36px 38px;display:flex;flex-direction:column;\">\n          <span style=\"font-family:'Barlow',sans-serif;font-weight:700;font-size:15px;letter-spacing:0.18em;text-transform:uppercase;color:#F2C20B;\">After the project<\u002Fspan>\n          <h3 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:30px;margin:12px 0 22px;color:#F7F5F0;\">A safer, faster foundation<\u002Fh3>\n          <ul style=\"margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:16px;\">\n            <li style=\"font-family:'Barlow',sans-serif;font-size:22px;line-height:1.4;color:#C7C3B9;padding-left:24px;position:relative;\"><span style=\"position:absolute;left:0;top:11px;width:8px;height:8px;background:#BC2018;border-radius:50%;\"><\u002Fspan><strong style=\"color:#F1EEE8;\">Supported, patched systems<\u002Fstrong> — the open door to attackers closes.<\u002Fli>\n            <li style=\"font-family:'Barlow',sans-serif;font-size:22px;line-height:1.4;color:#C7C3B9;padding-left:24px;position:relative;\"><span style=\"position:absolute;left:0;top:11px;width:8px;height:8px;background:#BC2018;border-radius:50%;\"><\u002Fspan><strong style=\"color:#F1EEE8;\">Better reliability &amp; speed<\u002Fstrong> on the apps used every day.<\u002Fli>\n            <li style=\"font-family:'Barlow',sans-serif;font-size:22px;line-height:1.4;color:#C7C3B9;padding-left:24px;position:relative;\"><span style=\"position:absolute;left:0;top:11px;width:8px;height:8px;background:#BC2018;border-radius:50%;\"><\u002Fspan>Stronger <strong style=\"color:#F1EEE8;\">compliance &amp; insurance<\u002Fstrong> posture.<\u002Fli>\n            <li style=\"font-family:'Barlow',sans-serif;font-size:22px;line-height:1.4;color:#C7C3B9;padding-left:24px;position:relative;\"><span style=\"position:absolute;left:0;top:11px;width:8px;height:8px;background:#BC2018;border-radius:50%;\"><\u002Fspan>Lower long-term cost and a <strong style=\"color:#F1EEE8;\">documented<\u002Fstrong> environment.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;gap:14px;margin-top:30px;background:#ECE7DC;border:1px solid #E2DDD2;padding:20px 28px;\">\n        <span style=\"width:10px;height:10px;background:#BC2018;border-radius:50%;display:block;flex:none;\"><\u002Fspan>\n        <p style=\"font-family:'Barlow',sans-serif;font-weight:600;font-size:22px;color:#3A3F3C;margin:0;\">For your teams: the applications you rely on get <strong>safer and faster<\u002Fstrong> — without a disruptive cutover.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"position:absolute;left:104px;right:104px;bottom:42px;display:flex;justify-content:space-between;align-items:center;font-family:'Barlow',sans-serif;font-size:15px;letter-spacing:0.08em;color:#A8A498;text-transform:uppercase;\">\n        <span>Trevor Vaillancourt<\u002Fspan><span>Windows Server Modernization<\u002Fspan><span>06 / 10<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══════════ SLIDE 7 — PROJECT MANAGEMENT ═══════════ -->\n  <section data-label=\"Management\" data-screen-label=\"07 Management\" data-speaker-notes=\"Show this won't be chaotic. One accountable owner — me — reporting to leadership at each checkpoint. Phased gating so there are no blank cheques. Your reps act as SMEs. A clear communication plan: a published schedule of maintenance windows, regular status updates, advance notice for anything that touches a team. A risk register, and a rollback for every change. Vendors — application providers and Microsoft — engaged where needed.\">\n    <div style=\"position:relative;width:100%;height:100%;box-sizing:border-box;padding:84px 104px 92px;background:#F4F2ED;color:#1C1E1C;font-family:'Barlow',sans-serif;display:flex;flex-direction:column;overflow:hidden;\">\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:30px;\">\n        <span style=\"width:34px;height:4px;background:#BC2018;display:block;\"><\u002Fspan>\n        <span style=\"font-family:'Barlow',sans-serif;font-weight:700;font-size:17px;letter-spacing:0.2em;text-transform:uppercase;color:#BC2018;\">07 · How it would be managed<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:58px;line-height:1.02;letter-spacing:-0.02em;margin:0 0 40px;m  status updates, advance notice before anything affects you.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FBFAF7;border:1px solid #E2DDD2;border-top:4px solid #BC2018;padding:30px 30px;\">\n          <h3 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:25px;margin:0 0 12px;\">Risk register &amp; rollback<\u002Fh3>\n          <p style=\"font-family:'Barlow',sans-serif;font-size:21px;line-height:1.42;color:#4A4F4C;margin:0;\">Every change documented, every change reversible if something doesn’t behave.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FBFAF7;border:1px solid #E2DDD2;border-top:4px solid #BC2018;padding:30px 30px;\">\n          <h3 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:25px;margin:0 0 12px;\">Vendors engaged<\u002Fh3>\n          <p style=\"font-family:'Barlow',sans-serif;font-size:21px;line-height:1.42;color:#4A4F4C;margin:0;\">Application providers and Microsoft brought in where their expertise reduces risk.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"position:absolute;left:104px;right:104px;bottom:42px;display:flex;justify-content:space-between;align-items:center;font-family:'Barlow',sans-serif;font-size:15px;letter-spacing:0.08em;color:#A8A498;text-transform:uppercase;\">\n        <span>Trevor Vaillancourt<\u002Fspan><span>Windows Server Modernization<\u002Fspan><span>07 / 10<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══════════ SLIDE 8 — ASSUMPTIONS & SCOPE ═══════════ -->\n  <section data-label=\"Assumptions\" data-screen-label=\"08 Assumptions\" data-speaker-notes=\"This is the section you asked me to give more weight — be candid and structured. I'm working from clear, stated assumptions, and I'm being explicit about scope so expectations are set. Walk the assumptions briefly: ~13 servers (confirmed in discovery), our M365 tenant can absorb suitable workloads, no critical app is incompatible (proven in pilo ht:800;font-size:56px;line-height:1.02;letter-spacing:-0.02em;margin:0 0 36px;max-width:1340px;color:#F7F5F0;position:relative;\">Why I’m the right person to lead this<\u002Fh2>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px 40px;position:relative;margin-bottom:6px;\">\n        <div style=\"display:flex;gap:16px;align-items:flex-start;padding:6px 0;\"><span style=\"width:9px;height:9px;background:#BC2018;border-radius:50%;margin-top:11px;flex:none;\"><\u002Fspan><p style=\"font-family:'Barlow',sans-serif;font-size:23px;line-height:1.4;color:#C7C3B9;margin:0;\"><strong style=\"color:#F1EEE8;\">I’ve run the cutovers myself<\u002Fstrong> — migrations planned <em>and<\u002Fem> executed end-to-end, rollbacks included. I know where they go wrong.<\u002Fp><\u002Fdiv>\n        <div style=\"display:flex;gap:16px;align-items:flex-start;padding:6px 0;\"><span style=\"width:9px;height:9px;background:#BC2018;border-radius:50%;margin-top:11px;flex:none;\"><\u002Fspan><p style=\"font-family:'Barlow',sans-serif;font-size:23px;line-height:1.4;color:#C7C3B9;margin:0;\"><strong style=\"color:#F1EEE8;\">Calm when it counts<\u002Fstrong> — I plan for the bad night, so a failed change is a quiet rollback, not an outage.<\u002Fp><\u002Fdiv>\n        <div style=\"display:flex;gap:16px;align-items:flex-start;padding:6px 0;\"><span style=\"width:9px;height:9px;background:#BC2018;border-radius:50%;margin-top:11px;flex:none;\"><\u002Fspan><p style=\"font-family:'Barlow',sans-serif;font-size:23px;line-height:1.4;color:#C7C3B9;margin:0;\"><strong style=\"color:#F1EEE8;\">I keep every department in the loop<\u002Fstrong> — plain-language updates and fair warning, never surprises.<\u002Fp><\u002Fdiv>\n        <div style=\"display:flex;gap:16px;align-items:flex-start;padding:6px 0;\"><span style=\"width:9px;height:9px;background:#BC2018;border-radius:50%;margin-top:11px;flex:none;\"><\u002Fspan><p style=\"font-family:'Barlow',sans-serif;font-size:23px;line-height:1.4;color:#C7C3B9;margin:0;\"><strong style=\"color:#F1EEE8;\">Local and invested<\u002Fstrong> — I want to help protect and modernize the systems Fowler runs on.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:auto;background:#22231F;border:1px solid #34352F;border-left:6px solid #BC2018;padding:30px 38px;position:relative;\">\n        <span style=\"font-family:'Barlow',sans-serif;font-weight:700;font-size:15px;letter-spacing:0.2em;text-transform:uppercase;color:#F2C20B;\">The ask<\u002Fspan>\n        <p style=\"font-family:'Archivo',sans-serif;font-weight:600;font-size:31px;line-height:1.26;color:#F7F5F0;margin:14px 0 0;\">Approve the <span style=\"color:#F2C20B;\">Discovery phase<\u002Fspan>. In four weeks I’ll return with a full inventory, a dependency map, and a costed migration plan.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-end;margin-top:30px;position:relative;\">\n        <div style=\"display:flex;flex-direction:column;gap:4px;\">\n          <span style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:24px;color:#F1EEE8;\">Thank you.<\u002Fspan>\n          <span style=\"font-family:'Barlow',sans-serif;font-weight:500;font-size:18px;letter-spacing:0.04em;color:#9A968D;\">Trevor Vaillancourt · IT Operations Specialist<\u002Fspan>\n        <\u002Fdiv>\n        <img src=\"a6733d84-33f6-4c56-9bde-ebc6f678d253\" alt=\"Fowler\" style=\"height:84px;width:auto;display:block;\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══════════ APPENDIX — DELIVERABLES ═══════════ -->\n  <section data-label=\"Appendix · Deliverables\" data-screen-label=\"Appendix Deliverables\" data-speaker-notes=\"Optional appendix — only show if there's time or if asked 'what would those deliverables look like?'. These are the three working templates I'd populate during Discovery: a full server inventory with live dropdowns, a dependency map, and a costed migration plan. Click any card to open the actual template. The point: I don't just describe the deliverables — I've already built the shells, so day one is productive.\">\n    <div style=\"position:relative;width:100%;height:100%;box-sizing:border-box;padding:84px 104px 92px;background:#F4F2ED;color:#1C1E1C;font-family:'Barlow',sans-serif;display:flex;flex-direction:column;overflow:hidden;\">\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:14px;\">\n        <span style=\"width:34px;height:4px;background:#BC2018;display:block;\"><\u002Fspan>\n        <span style=\"font-family:'Barlow',sans-serif;font-weight:700;font-size:17px;letter-spacing:0.2em;text-transform:uppercase;color:#BC2018;\">Appendix · What I’d deliver after Discovery<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:52px;line-height:1.02;letter-spacing:-0.02em;margin:0 0 8px;max-width:1340px;\">The deliverables — already started<\u002Fh2>\n      <p style=\"font-family:'Barlow',sans-serif;font-weight:400;font-size:22px;line-height:1.4;color:#5A5F5B;margin:0 0 36px;max-width:1200px;\">Working templates, ready to populate. Click any card to open it.<\u002Fp>\n\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:28px;flex:1;align-content:start;\">\n        <a href=\"Fowler Server Inventory.dc.html\" style=\"text-decoration:none;color:inherit;background:#FBFAF7;border:1px solid #E2DDD2;border-top:4px solid #BC2018;padding:34px 32px;display:flex;flex-direction:column;transition:transform .12s;\" style-hover=\"transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,0.10);\">\n          <span style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:28px;color:#BC2018;line-height:1;\">01<\u002Fspan>\n          <h3 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:27px;line-height:1.12;margin:18px 0 12px;\">Server Inventory<\u002Fh3>\n          <p style=\"font-family:'Barlow',sans-serif;font-size:20px;line-height:1.44;color:#4A4F4C;margin:0 0 18px;flex:1;\">Every server with role, OS, end-of-life status and migration target — live dropdowns, color-coded.<\u002Fp>\n          <span style=\"font-family:'Barlow',sans-serif;font-weight:700;font-size:16px;letter-spacing:0.04em;color:#BC2018;\">Open template →<\u002Fspan>\n        <\u002Fa>\n        <a href=\"Fowler Dependency Map.dc.html\" style=\"text-decoration:none;color:inherit;background:#FBFAF7;border:1px solid #E2DDD2;border-top:4px solid #BC2018;padding:34px 32px;display:flex;flex-direction:column;transition:transform .12s;\" style-hover=\"transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,0.10);\">\n          <span style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:28px;color:#BC2018;line-height:1;\">02<\u002Fspan>\n          <h3 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:27px;line-height:1.12;margin:18px 0 12px;\">Dependency Map<\u002Fh3>\n          <p style=\"font-family:'Barlow',sans-serif;font-size:20px;line-height:1.44;color:#4A4F4C;margin:0 0 18px;flex:1;\">Which servers run which applications — and the departments that depend on them. Click to trace a chain.<\u002Fp>\n          <span style=\"font-family:'Barlow',sans-serif;font-weight:700;font-size:16px;letter-spacing:0.04em;color:#BC2018;\">Open template →<\u002Fspan>\n        <\u002Fa>\n        <a href=\"Fowler Migration Cost Plan.dc.html\" style=\"text-decoration:none;color:inherit;background:#FBFAF7;border:1px solid #E2DDD2;border-top:4px solid #BC2018;padding:34px 32px;display:flex;flex-direction:column;transition:transform .12s;\" style-hover=\"transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,0.10);\">\n          <span style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:28px;color:#BC2018;line-height:1;\">03<\u002Fspan>\n          <h3 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:27px;line-height:1.12;margin:18px 0 12px;\">Costed Migration Plan<\u002Fh3>\n          <p style=\"font-family:'Barlow',sans-serif;font-size:20px;line-height:1.44;color:#4A4F4C;margin:0 0 18px;flex:1;\">Line-item costs by phase with live totals and contingency — the budget envelope, quantified.<\u002Fp>\n          <span style=\"font-family:'Barlow',sans-serif;font-weight:700;font-size:16px;letter-spacing:0.04em;color:#BC2018;\">Open template →<\u002Fspan>\n        <\u002Fa>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;gap:14px;margin-top:30px;background:#191B1A;padding:20px 30px;\">\n        <span style=\"width:10px;height:10px;background:#F2C20B;border-radius:50%;display:block;flex:none;\"><\u002Fspan>\n        <p style=\"font-family:'Barlow',sans-serif;font-weight:600;font-size:22px;color:#F1EEE8;margin:0;\">I’ve already built the shells — so the day Discovery is approved, we’re productive immediately.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"position:absolute;left:104px;right:104px;bottom:42px;display:flex;justify-content:space-between;align-items:center;font-family:'Barlow',sans-serif;font-size:15px;letter-spacing:0.08em;color:#A8A498;text-transform:uppercase;\">\n        <span>Trevor Vaillancourt<\u002Fspan><span>Windows Server Modernization<\u002Fspan><span>Appendix<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fx-import>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
